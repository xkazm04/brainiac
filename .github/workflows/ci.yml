name: ci

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgres://brainiac:brainiac@localhost:5432/brainiac

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: brainiac
          POSTGRES_PASSWORD: brainiac
          POSTGRES_DB: brainiac
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U brainiac -d brainiac"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace
      # P7 (EVAL.md §3.2): hard gates (RLS leaks / superseded-in-top3 = 0) are
      # unconditional; the regression gates compare against the committed
      # baseline (overall NDCG −1pt, per-stratum −2pts, temporal rank-1 −2pts,
      # cross-team must clear semantic by 5pts). Recalibrate deliberately with
      # `eval --write-baseline results/baseline.json` and commit the diff.
      - name: eval retrieval profile + regression gates
        run: >
          cargo run -p brainiac-server -- eval
          --fixtures fixtures/v1 --profile retrieval
          --baseline results/baseline.json
          --out results/ci-run.json
          --diagnostics results/ci-diagnostics.json
      # The drill-down is what you actually read when a gate trips.
      - name: upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: |
            results/ci-run.json
            results/ci-diagnostics.json
          if-no-files-found: ignore

  # The console was previously not exercised in CI at all — a tsc break or a
  # failing honesty-guard test (kb-data.test.ts) could reach master invisibly.
  # Three gates, cheapest first; `next build` uses its own dist dir by design
  # (package.json wires NEXT_DIST_DIR=.next-build), so this also exercises the
  # exact build path a deploy uses.
  console:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: console/package-lock.json
      - name: install
        run: npm ci
      - name: typecheck
        run: npx tsc --noEmit
      - name: vitest
        run: npx vitest run
      - name: build
        run: npm run build
